1,.04)",border:"1px solid rgba(245,158,11,.1)",borderRadius:11,padding:"12px 14px"}}><div style={{fontSize:".55rem",fontWeight:700,color:V.am,letterSpacing:".07em",textTransform:"uppercase",marginBottom:7}}>🧠 VIRAL ANALYSIS</div><div style={{fontSize:".76rem",color:V.t3,lineHeight:1.5}}>{activeClip.whyViral}</div></div></div><div style={{display:"flex",gap:10,marginTop:10,flexWrap:"wrap",alignItems:"center"}}><div style={{flex:1,minWidth:180}}><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{activeClip.hashtags?.map((h,i)=><span key={i} style={{background:V.vbg,border:`1px solid ${V.vbr}`,borderRadius:50,padding:"2px 8px",fontSize:".65rem",color:V.v2,fontWeight:600}}>{h}</span>)}</div></div><button onClick={()=>addToQueue(activeClip)} style={{background:`linear-gradient(135deg,${V.v},${V.b})`,border:"none",borderRadius:9,padding:"11px 20px",color:"#fff",fontWeight:800,fontSize:".82rem",cursor:"pointer",boxShadow:"0 4px 16px rgba(139,92,246,.2)",whiteSpace:"nowrap"}}>📋 Add to Queue</button></div></div>)}</div>)}

          {/* ═══ CAPTIONS ═══ */}
          {view==="captions"&&project&&activeClip&&(<div style={{padding:18,animation:"appFadeIn .3s ease"}}><div style={{fontSize:".65rem",fontWeight:700,color:V.t4,letterSpacing:".06em",textTransform:"uppercase",marginBottom:14}}>Caption Style</div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>{CAPTIONS.map(s=>(<div key={s.id} onClick={()=>setCaptionStyle(s.id)} style={{background:captionStyle===s.id?V.vbg:V.s2,border:`1px solid ${captionStyle===s.id?V.vbr:V.brd}`,borderRadius:12,overflow:"hidden",cursor:"pointer"}}><div style={{height:100,background:"linear-gradient(135deg,#0a0a0f,#12121a)",display:"flex",alignItems:"center",justifyContent:"center",padding:14}}><div style={{textAlign:"center",fontSize:".9rem",fontWeight:700,color:"#fff"}}>{activeClip.hookLine?.split(" ").slice(0,4).map((w,i)=><span key={i} style={{color:i===2?s.a:"#fff"}}>{w} </span>)}</div></div><div style={{padding:"10px 12px"}}><div style={{fontSize:".78rem",fontWeight:700}}>{s.name}</div><div style={{fontSize:".65rem",color:V.t4,marginTop:2}}>{s.desc}</div></div></div>))}</div></div>)}

          {/* ═══ TEMPLATES ═══ */}
          {view==="templates"&&project&&(<div style={{padding:18,animation:"appFadeIn .3s ease"}}><div style={{fontSize:".65rem",fontWeight:700,color:V.t4,letterSpacing:".06em",textTransform:"uppercase",marginBottom:14}}>Layout Template</div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>{TMPLS.map(t=>(<div key={t.id} onClick={()=>setTemplate(t.id)} style={{background:template===t.id?V.vbg:V.s2,border:`1px solid ${template===t.id?V.vbr:V.brd}`,borderRadius:12,padding:16,cursor:"pointer",textAlign:"center"}}><div style={{fontSize:"2.2rem",marginBottom:8}}>{t.i}</div><div style={{fontSize:".82rem",fontWeight:700}}>{t.name}</div><div className="mono" style={{fontSize:".65rem",color:V.v2,marginTop:2}}>{t.r}</div></div>))}</div></div>)}

          {/* ═══ EXPORT ═══ */}
          {view==="export"&&project&&activeClip&&(<div style={{padding:18,maxWidth:780,animation:"appFadeIn .3s ease"}}><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:7,marginBottom:16}}>{PLATS.map(p=>(<div key={p.id} onClick={()=>togglePlat(p.id)} style={{background:selPlats.includes(p.id)?`${p.c}12`:V.s2,border:`1px solid ${selPlats.includes(p.id)?`${p.c}40`:V.brd}`,borderRadius:9,padding:10,cursor:"pointer"}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><span style={{width:20,height:20,borderRadius:5,background:p.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:".6rem",color:"#fff",fontWeight:900}}>{p.icon}</span><span style={{fontSize:".75rem",fontWeight:700}}>{p.name}</span></div><div style={{fontSize:".58rem",color:V.t5}}>Max: {p.max}</div></div>))}</div><div style={{textAlign:"center"}}><button onClick={()=>addToQueue(activeClip)} style={{background:`linear-gradient(135deg,${V.v},${V.b})`,border:"none",borderRadius:8,padding:"10px 22px",color:"#fff",fontWeight:800,fontSize:".82rem",cursor:"pointer",boxShadow:"0 4px 16px rgba(139,92,246,.25)"}}>🚀 Export & Publish</button><button onClick={exportClips} style={{marginLeft:8,background:V.s3,border:`1px solid ${V.brd}`,borderRadius:8,padding:"10px 22px",color:V.t3,fontWeight:700,fontSize:".82rem",cursor:"pointer"}}>📥 Download .txt</button></div></div>)}

          {/* ═══ ANALYTICS ═══ */}
          {view==="analytics"&&project&&(<div style={{padding:18,animation:"appFadeIn .3s ease"}}><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8,marginBottom:16}}>{[{l:"Total Clips",v:project.totalClipsFound,c:V.v2},{l:"Avg Score",v:avgScore,c:sC(avgScore)},{l:"Top Score",v:Math.max(...project.clips.map(c=>c.viralScore)),c:V.pk},{l:"Clips Shown",v:project.clips.length,c:V.b2}].map((s,i)=>(<div key={i} style={{background:V.s2,border:`1px solid ${V.brd}`,borderRadius:10,padding:"12px 14px"}}><div className="mono" style={{fontSize:"1.3rem",fontWeight:700,color:s.c,lineHeight:1}}>{s.v}</div><div style={{fontSize:".6rem",color:V.t5,marginTop:3}}>{s.l}</div></div>))}</div><div style={{background:V.s2,border:`1px solid ${V.brd}`,borderRadius:12,padding:14}}><div style={{fontSize:".65rem",fontWeight:700,color:V.t4,letterSpacing:".06em",textTransform:"uppercase",marginBottom:12}}>Score Distribution</div><div style={{display:"flex",alignItems:"end",gap:4,height:110}}>{project.clips.map((c,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span className="mono" style={{fontSize:".5rem",color:sC(c.viralScore),fontWeight:700}}>{c.viralScore}</span><div style={{width:"100%",height:`${c.viralScore}%`,background:`linear-gradient(180deg,${sC(c.viralScore)},${sC(c.viralScore)}33)`,borderRadius:"3px 3px 0 0",cursor:"pointer",animation:`appBarGrow .5s ease ${i*.04}s both`}} onClick={()=>{setActiveClip(c);setView("editor")}}/></div>)}</div></div></div>)}

          {/* ═══ QUEUE ═══ */}
          {view==="queue"&&(<div style={{padding:18,animation:"appFadeIn .3s ease"}}><div style={{fontSize:".65rem",fontWeight:700,color:V.t4,letterSpacing:".06em",textTransform:"uppercase",marginBottom:14}}>Export Queue ({queue.length})</div>{queue.length===0?<div style={{textAlign:"center",padding:"50px 20px",color:V.t5}}><div style={{fontSize:"2.2rem",marginBottom:10}}>📋</div><div style={{fontSize:".85rem",fontWeight:600,color:V.t4}}>Queue is empty</div></div>:<div style={{display:"flex",flexDirection:"column",gap:6}}>{queue.map((q,i)=><div key={i} style={{background:V.s2,border:`1px solid ${V.brd}`,borderRadius:9,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}><div style={{flex:1}}><div style={{fontSize:".78rem",fontWeight:700}}>{q.clipTitle}</div></div><span className="mono" style={{fontSize:".68rem",fontWeight:800,color:sC(q.viralScore)}}>{q.viralScore}</span><button onClick={()=>setQueue(queue.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:V.t5,cursor:"pointer",fontSize:".85rem"}}>✕</button></div>)}<button onClick={()=>setQueue([])} style={{marginTop:6,background:`linear-gradient(135deg,${V.v},${V.b})`,border:"none",borderRadius:9,padding:11,color:"#fff",fontWeight:800,cursor:"pointer"}}>🚀 Export All ({queue.length})</button></div>}</div>)}

          {/* ═══ PROJECTS ═══ */}
          {view==="projects"&&(<div style={{padding:18,animation:"appFadeIn .3s ease"}}><div style={{fontSize:".65rem",fontWeight:700,color:V.t4,letterSpacing:".06em",textTransform:"uppercase",marginBottom:14}}>Projects ({projects.length})</div>{projects.length===0?<div style={{textAlign:"center",padding:"50px 20px",color:V.t5}}>📂 No projects yet</div>:<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>{projects.map((p,i)=><div key={i} onClick={()=>{setProject(p);setActiveClip(p.clips[0]);setView("editor")}} style={{background:V.s2,border:`1px solid ${V.brd}`,borderRadius:12,overflow:"hidden",cursor:"pointer"}}>{p.videoId&&<div style={{height:80,overflow:"hidden",position:"relative"}}><img src={`https://img.youtube.com/vi/${p.videoId}/hqdefault.jpg`} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/></div>}<div style={{padding:"10px 12px"}}><div style={{fontSize:".72rem",fontWeight:700}}>{p.creatorName}</div><div style={{fontSize:".65rem",color:V.t4}}>{p.videoTitle?.slice(0,50)}…</div><div className="mono" style={{fontSize:".55rem",color:V.t5,marginTop:4}}>{p.createdAt}</div></div></div>)}</div>}</div>)}

          {/* Needs project */}
          {["editor","captions","templates","export","analytics"].includes(view)&&!project&&(<div style={{textAlign:"center",padding:"70px 20px",animation:"appFadeIn .3s ease"}}><div style={{fontSize:"2.5rem",marginBottom:12}}>⚡</div><div style={{fontSize:".9rem",fontWeight:700,color:V.t3}}>No active project</div><div style={{fontSize:".78rem",color:V.t5,marginTop:4,marginBottom:18}}>Generate clips first</div><button onClick={()=>setView("generate")} style={{background:`linear-gradient(135deg,${V.v},${V.b})`,border:"none",borderRadius:8,padding:"9px 22px",color:"#fff",fontWeight:700,cursor:"pointer"}}>⚡ Generate</button></div>)}
        </div>
      </main>
    </div>
  </div>);
}

// Mount
const appRoot = document.getElementById('app-root');
if (appRoot) {
  const root = ReactDOM.createRoot(appRoot);
  root.render(<ClipSpeedPro />);
}
</script>
